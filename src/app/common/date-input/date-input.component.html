<div class="input">
  <div class="date-input">
    <input
      #input
      [id]="inputId"
      type="date"
      [min]="min()"
      [max]="max()"
      [ngModel]="_date"
      (ngModelChange)="currentDateChange($event)"
      [required]="required()"
      [class.invalid]="!isValid"
      (blur)="onBlur()"/>
    <label [class.required]="required()" [class.no-content]="_date === ''">{{ label() }}</label>
    <div class="hide-default-icon"></div>
    <icon-button-mini icon="calendar_month" (buttonClick)="showDialog(input)"/>
  </div>
  @if (!hideErrors()) {
    <div class="input-errors">
      @for(error of errors; track error.code){
        <span>{{error.message}}</span>
      }
    </div>
  }
</div>
